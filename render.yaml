services:
  - type: web
    name: madurai-civic-api
    runtime: python
    pythonVersion: "3"
    buildCommand: cd server && pip install -r requirements.txt
    startCommand: cd server && gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 4
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: FRONTEND_URL
        value: "https://madurai-civic-system.vercel.app"
      - key: UPLOAD_FOLDER
        value: "/opt/render/project/src/uploads"
      - key: MAX_CONTENT_LENGTH
        value: "16777216"
